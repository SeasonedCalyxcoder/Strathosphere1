<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Strathosphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html"><img src="Strathmore University Icon.png" alt="Strathmore Icon" width="52" height="52" class="me-2" style="object-fit: contain;">Strathosphere</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-home"></i>Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="map.html"><i class="fas fa-map-marked-alt"></i>Map</a></li>
                    <li class="nav-item"><a class="nav-link active" href="events.html"><i class="fas fa-calendar-alt"></i>Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="resources.html"><i class="fas fa-book"></i>Resources</a></li>
                    <li class="nav-item"><a class="nav-link" href="rewards.html"><i class="fas fa-trophy"></i>Rewards</a></li>
                    <li class="nav-item ms-lg-3" id="nav-auth">
                        <a href="login.html" class="btn btn-secondary"><i class="fas fa-sign-in-alt me-2"></i>Login</a>
                    </li>
                    <li class="nav-item ms-lg-2" id="nav-user"></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <h2 class="fw-bold mb-1" style="color: var(--primary);"><i class="fas fa-calendar-star me-2" style="color: var(--secondary);"></i>Campus Events</h2>
                <p class="text-muted mb-0">Discover and participate in academic, social, and career events</p>
            </div>
            <button class="btn btn-outline-primary admin-only d-none" data-bs-toggle="modal" data-bs-target="#createEventModal">
                <i class="fas fa-plus me-2"></i>Create Event
            </button>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" class="form-control" id="eventSearch" placeholder="Search events...">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="categoryFilter">
                            <option value="all">All Categories</option>
                            <option value="academic">Academic</option>
                            <option value="social">Social</option>
                            <option value="career">Career</option>
                            <option value="sports">Sports</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="sortFilter">
                            <option value="date">Sort by Date</option>
                            <option value="points">Sort by Points</option>
                            <option value="cost">Sort by Cost</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-outline-secondary w-100" id="myEventsBtn"><i class="fas fa-ticket-alt me-1"></i>My Events</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4" id="eventsGrid"></div>
        <div id="emptyState" class="text-center py-5 d-none">
            <i class="fas fa-calendar-times" style="font-size: 4rem; color: var(--border);"></i>
            <h4 class="mt-3 text-muted">No events found</h4>
        </div>

        <div class="modal fade" id="registerEventModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header" style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: white;">
                        <h5 class="modal-title"><i class="fas fa-ticket-alt me-2"></i>Event Registration</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-2 text-muted small">Event</div>
                        <div class="fw-bold mb-3" id="regEventTitle">—</div>
                        <div class="mb-3" id="regPaymentMessage"></div>

                        <label class="form-label">Phone Number</label>
                        <div class="input-group">
                            <span class="input-group-text">+254</span>
                            <input type="tel" class="form-control" id="regPhoneLocal" placeholder="7XXXXXXXX" maxlength="9" inputmode="numeric">
                        </div>
                        <small class="text-muted">Enter 9 digits after +254 (for example 712345678).</small>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary" id="confirmRegisterBtn"><i class="fas fa-check-circle me-2"></i>Confirm</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createEventModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: white;">
                    <h5 class="modal-title"><i class="fas fa-plus-circle me-2"></i>Create New Event</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createEventForm">
                        <div class="row g-3">
                            <div class="col-md-8"><label class="form-label">Event Title</label><input type="text" class="form-control" id="evtTitle" required></div>
                            <div class="col-md-4">
                                <label class="form-label">Category</label>
                                <select class="form-select" id="evtCategory">
                                    <option value="academic">Academic</option><option value="social">Social</option><option value="career">Career</option><option value="sports">Sports</option>
                                </select>
                            </div>
                            <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" id="evtDesc" rows="3" required></textarea></div>
                            <div class="col-md-6"><label class="form-label">Location</label><select class="form-select" id="evtLocation"></select></div>
                            <div class="col-md-3"><label class="form-label">Date</label><input type="date" class="form-control" id="evtDate" required></div>
                            <div class="col-md-3"><label class="form-label">Time</label><input type="time" class="form-control" id="evtTime" required></div>
                            <div class="col-md-4"><label class="form-label">Cost (KES)</label><input type="number" class="form-control" id="evtCost" value="0" min="0"></div>
                            <div class="col-md-4"><label class="form-label">Points Reward</label><input type="number" class="form-control" id="evtPoints" value="50" min="0"></div>
                            <div class="col-md-4"><label class="form-label">Max Attendees</label><input type="number" class="form-control" id="evtMax" value="100" min="1"></div>
                            <div class="col-md-8"><label class="form-label">Image URL</label><input type="url" class="form-control" id="evtImage" placeholder="https://..."></div>
                            <div class="col-md-4"><label class="form-label">Organizer</label><input type="text" class="form-control" id="evtOrganizer" required></div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveEventBtn"><i class="fas fa-save me-2"></i>Create Event</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        let showingMyEvents = false;
        let pendingRegistration = null;
        const pageParams = new URLSearchParams(window.location.search);
        const forcedLocationId = parseInt(pageParams.get('location_id') || pageParams.get('location') || '0', 10) || 0;

        function sanitizeLocalPhoneInput(value) {
            return value.replace(/\D/g, '').slice(0, 9);
        }

        function buildPhoneWithCountryCode(localDigits) {
            const clean = sanitizeLocalPhoneInput(localDigits);
            return `+254${clean}`;
        }

        function isValidKenyanPhone(localDigits) {
            return /^\d{9}$/.test(sanitizeLocalPhoneInput(localDigits));
        }

        function openRegistrationModal(eventId, title, cost, userPhoneNumber) {
            pendingRegistration = { eventId, title, cost: Number(cost || 0) };

            document.getElementById('regEventTitle').textContent = title;
            const phoneInput = document.getElementById('regPhoneLocal');
            const savedPhone = (userPhoneNumber || '').replace(/\s+|-/g, '');
            if (/^\+254\d{9}$/.test(savedPhone)) {
                phoneInput.value = savedPhone.slice(4);
            } else if (/^254\d{9}$/.test(savedPhone)) {
                phoneInput.value = savedPhone.slice(3);
            } else {
                phoneInput.value = '';
            }

            const paymentMessage = document.getElementById('regPaymentMessage');
            const confirmButton = document.getElementById('confirmRegisterBtn');

            if (pendingRegistration.cost > 0) {
                paymentMessage.className = 'alert alert-warning py-2 mb-3';
                paymentMessage.textContent = `This ticket costs KES ${pendingRegistration.cost}. You will receive an M-Pesa STK payment prompt on confirmation.`;
                confirmButton.innerHTML = '<i class="fas fa-mobile-alt me-2"></i>Pay & Register';
            } else {
                paymentMessage.className = 'alert alert-info py-2 mb-3';
                paymentMessage.textContent = 'This is a free event. Confirm to register your ticket.';
                confirmButton.innerHTML = '<i class="fas fa-check-circle me-2"></i>Register';
            }

            const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('registerEventModal'));
            modal.show();
        }

        async function renderEvents() {
            const grid = document.getElementById('eventsGrid');
            const empty = document.getElementById('emptyState');
            const search = document.getElementById('eventSearch').value;
            const category = document.getElementById('categoryFilter').value;
            const sort = document.getElementById('sortFilter').value;

            let res;
            if (showingMyEvents) {
                res = await apiMyEvents();
            } else {
                res = await apiGetEvents(category, search, sort, forcedLocationId);
            }

            if (!res.success) { empty.classList.remove('d-none'); return; }
            let events = res.events;
            if (events.length === 0) { grid.innerHTML = ''; empty.classList.remove('d-none'); return; }
            empty.classList.add('d-none');

            grid.innerHTML = events.map(evt => {
                const date = new Date(evt.event_date);
                const day = date.getDate();
                const month = date.toLocaleString('default', { month: 'short' });
                const isAttending = evt.is_attending;
                const isFull = evt.attendee_count >= evt.max_attendees;

                return `
                    <div class="col-md-6 col-lg-4">
                        <div class="card event-card h-100">
                            <div class="position-relative">
                                <img src="${evt.image}" class="event-image" alt="${evt.title}" onerror="this.src='https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=600'">
                                <div class="event-date-badge"><div class="day">${day}</div><div class="month">${month}</div></div>
                                <div class="event-points">+${evt.points} pts</div>
                            </div>
                            <div class="card-body">
                                <span class="badge badge-soft badge-soft-primary mb-2">${evt.category}</span>
                                <h5 class="fw-bold" style="color: var(--primary);">${evt.title}</h5>
                                <p class="text-muted" style="font-size: 0.9rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${evt.description}</p>
                                <div class="event-meta">
                                    <span><i class="fas fa-map-marker-alt"></i>${evt.location_name || 'TBA'}</span>
                                    <span><i class="fas fa-clock"></i>${formatTime(evt.event_time)}</span>
                                </div>
                                <div class="d-flex justify-content-between align-items-center mt-3">
                                    <span class="fw-bold" style="color: var(--primary);">${formatCurrency(evt.cost)}</span>
                                    <span class="text-muted small">${evt.attendee_count}/${evt.max_attendees} attending</span>
                                </div>
                                <button class="btn w-100 mt-3 ${isAttending ? 'btn-outline-danger' : (isFull ? 'btn-secondary' : 'btn-primary')}" 
                                    onclick='handleRegister(${evt.id}, ${isAttending ? 'true' : 'false'}, ${evt.cost}, ${JSON.stringify(evt.title || '')})' ${isFull && !isAttending ? 'disabled' : ''}>
                                    ${isAttending ? '<i class="fas fa-user-minus me-1"></i>Deregister' : (isFull ? 'Full' : '<i class="fas fa-ticket-alt me-1"></i>Register')}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function handleRegister(eventId, isAttending, cost, title) {
            const me = await apiMe();
            if (!me.success) { window.location.href = 'login.html?redirect=events.html'; return; }

            if (isAttending) {
                const confirmed = confirm('Are you sure you want to deregister from this event?');
                if (!confirmed) return;

                const result = await apiDeregisterEvent(eventId);
                if (result.success) {
                    showToast(result.message || 'Deregistered successfully.', 'success');
                    await updateNavUser();
                    renderEvents();
                } else {
                    showToast(result.message || 'Unable to deregister.', 'warning');
                }
                return;
            }

            openRegistrationModal(eventId, title, cost, me.user.phone_number || '');
        }

        async function confirmRegistration() {
            if (!pendingRegistration) return;

            const localDigits = sanitizeLocalPhoneInput(document.getElementById('regPhoneLocal').value);
            if (!isValidKenyanPhone(localDigits)) {
                showToast('Enter a valid 9-digit phone number after +254.', 'warning');
                return;
            }

            const result = await apiRegisterEvent(pendingRegistration.eventId, buildPhoneWithCountryCode(localDigits));
            if (result.success) {
                const pointsMsg = result.points_earned ? ` +${result.points_earned} points earned.` : '';
                showToast(`${result.message}${pointsMsg}`, 'success');

                const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('registerEventModal'));
                modal.hide();

                await updateNavUser();
                renderEvents();
            } else {
                showToast(result.message, 'warning');
            }
        }

        async function loadLocations() {
            const res = await apiGetLocations();
            if (res.success) {
                const sel = document.getElementById('evtLocation');
                res.locations.forEach(loc => { sel.innerHTML += `<option value="${loc.id}">${loc.name}</option>`; });
            }
        }

        document.getElementById('saveEventBtn').addEventListener('click', async () => {
            const form = document.getElementById('createEventForm');
            const formData = new FormData(form);
            const result = await apiCreateEvent(formData);
            if (result.success) {
                showToast('Event created!', 'success');
                bootstrap.Modal.getInstance(document.getElementById('createEventModal')).hide();
                form.reset();
                renderEvents();
            } else {
                showToast(result.message, 'danger');
            }
        });

        document.getElementById('eventSearch').addEventListener('input', renderEvents);
        document.getElementById('categoryFilter').addEventListener('change', renderEvents);
        document.getElementById('sortFilter').addEventListener('change', renderEvents);
        document.getElementById('regPhoneLocal').addEventListener('input', function() {
            this.value = sanitizeLocalPhoneInput(this.value);
        });
        document.getElementById('confirmRegisterBtn').addEventListener('click', confirmRegistration);
        document.getElementById('myEventsBtn').addEventListener('click', function() {
            showingMyEvents = !showingMyEvents;
            this.innerHTML = showingMyEvents ? '<i class="fas fa-calendar me-1"></i>All Events' : '<i class="fas fa-ticket-alt me-1"></i>My Events';
            this.classList.toggle('btn-primary');
            this.classList.toggle('btn-outline-secondary');
            renderEvents();
        });

        loadLocations();
        renderEvents();
    </script>
</body>
</html>
