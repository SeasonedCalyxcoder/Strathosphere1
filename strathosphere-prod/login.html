<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Strathosphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card fade-in">
            <div class="auth-logo">
                <div class="auth-logo-mark">
                    <img
                        src="Strathmore University Icon.png"
                        alt="Strathmore University Logo"
                        class="auth-logo-image"
                    >
                </div>
                <h2>Strathosphere</h2>
                <p class="text-muted">Campus Navigation & Events</p>
            </div>

            <ul class="nav nav-pills nav-fill mb-4" id="authTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">Login</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button">Register</button>
                </li>
            </ul>

            <div class="tab-content" id="authTabContent">
                <div class="tab-pane fade show active" id="login" role="tabpanel">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" class="form-control" id="loginEmail" placeholder="firstname.surname@strathmore.edu" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="loginPassword" placeholder="Enter password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100"><i class="fas fa-sign-in-alt me-2"></i>Login</button>
                    </form>
                </div>

                <div class="tab-pane fade" id="register" role="tabpanel">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control" id="regName" placeholder="John Doe" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" class="form-control" id="regEmail" placeholder="firstname.surname@strathmore.edu" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text">+254</span>
                                <input type="tel" class="form-control" id="regPhoneLocal" placeholder="7XXXXXXXX" maxlength="9" inputmode="numeric" required>
                            </div>
                            <small class="text-muted">Enter 9 digits after +254.</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="regPassword" placeholder="Min 6 characters" required minlength="6">
                                <button class="btn btn-outline-secondary" type="button" id="toggleRegPassword" aria-label="Show password">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="regConfirmPassword" placeholder="Re-enter password" required minlength="6">
                                <button class="btn btn-outline-secondary" type="button" id="toggleRegConfirmPassword" aria-label="Show confirm password">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100"><i class="fas fa-user-plus me-2"></i>Create Account</button>
                    </form>
                </div>
            </div>

            <div class="mt-4 text-center">
                <a href="index.html" class="text-decoration-none" style="color: var(--text-light);"><i class="fas fa-arrow-left me-1"></i>Back to Home</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect');

        function setupPasswordToggle(toggleButtonId, inputId) {
            const toggleButton = document.getElementById(toggleButtonId);
            const passwordInput = document.getElementById(inputId);

            if (!toggleButton || !passwordInput) {
                return;
            }

            toggleButton.addEventListener('click', function() {
                const isHidden = passwordInput.type === 'password';
                passwordInput.type = isHidden ? 'text' : 'password';
                this.innerHTML = `<i class="fas ${isHidden ? 'fa-eye-slash' : 'fa-eye'}"></i>`;
            });
        }

        setupPasswordToggle('toggleRegPassword', 'regPassword');
        setupPasswordToggle('toggleRegConfirmPassword', 'regConfirmPassword');

        function sanitizeLocalPhoneInput(value) {
            return value.replace(/\D/g, '').slice(0, 9);
        }

        function isValidKenyanLocalPhone(localDigits) {
            return /^\d{9}$/.test(sanitizeLocalPhoneInput(localDigits));
        }

        function isValidLoginEmail(email) {
            const normalized = String(email || '').trim().toLowerCase();
            return normalized === 'admin@strathmore.edu' || isValidStrathmoreEmail(normalized);
        }

        const regPhoneLocalInput = document.getElementById('regPhoneLocal');
        if (regPhoneLocalInput) {
            regPhoneLocalInput.addEventListener('input', function() {
                this.value = sanitizeLocalPhoneInput(this.value);
            });
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (typeof apiLogin !== 'function' || typeof isValidStrathmoreEmail !== 'function') {
                showToast('Login scripts failed to load. Please refresh the page.', 'danger');
                return;
            }

            const email = document.getElementById('loginEmail').value.trim();
            if (!isValidLoginEmail(email)) {
                showToast('Use format firstname.surname@strathmore.edu', 'danger');
                return;
            }

            const submitButton = this.querySelector('button[type="submit"]');
            const originalButtonHtml = submitButton ? submitButton.innerHTML : '';

            if (submitButton) {
                submitButton.disabled = true;
                submitButton.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Logging in...';
            }

            try {
                const result = await apiLogin(email, document.getElementById('loginPassword').value);
                if (result.success) {
                    showToast('Login successful!');
                    setTimeout(() => window.location.href = redirect || 'index.html', 1000);
                } else {
                    showToast(result.message, 'danger');
                }
            } catch (error) {
                const isFileProtocol = window.location.protocol === 'file:';
                const message = isFileProtocol
                    ? 'Unable to reach login service. Open this page via http://localhost/strathosphere-prod/login.html and ensure Apache is running in XAMPP.'
                    : 'Unable to reach login service. Ensure Apache is running in XAMPP, then try again.';
                showToast(message, 'danger');
            } finally {
                if (submitButton) {
                    submitButton.disabled = false;
                    submitButton.innerHTML = originalButtonHtml;
                }
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('regEmail').value.trim();
            if (!isValidStrathmoreEmail(email)) {
                showToast('Use format firstname.surname@strathmore.edu', 'danger');
                return;
            }

            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const regPhoneLocal = document.getElementById('regPhoneLocal').value;

            if (!isValidKenyanLocalPhone(regPhoneLocal)) {
                showToast('Enter a valid phone number (9 digits after +254).', 'danger');
                return;
            }

            const phoneNumber = `+254${sanitizeLocalPhoneInput(regPhoneLocal)}`;

            if (password !== confirmPassword) {
                showToast('Passwords do not match.', 'danger');
                return;
            }

            const result = await apiRegister(
                document.getElementById('regName').value,
                email,
                password,
                phoneNumber
            );
            if (result.success) {
                showToast(result.message || 'Registration submitted. Await admin approval.');
                document.getElementById('registerForm').reset();
                bootstrap.Tab.getOrCreateInstance(document.getElementById('login-tab')).show();
            } else {
                showToast(result.message, 'danger');
            }
        });
    </script>
</body>
</html>
